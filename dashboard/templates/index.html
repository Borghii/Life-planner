<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Personal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-page="dashboard">
  <div class="app-shell">
    <header>
      <div class="header-left" id="date-display">-</div>
      <div class="header-center" id="time-display">00:00:00</div>
      <div class="header-right">
        <div class="weather-pill" id="weather-pill">cloud Baigorria --C</div>
      </div>
    </header>

    <nav>
      <a href="/" class="active">Dashboard</a>
      <a href="/biblioteca">Biblioteca</a>
      <a href="/planificacion">Planificacion</a>
      <a href="/historial">Historial</a>
    </nav>

    <div class="progress-strip">
      <span class="progress-label">Progreso</span>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
      </div>
      <span class="progress-pct" id="progress-pct">0%</span>
    </div>

    <main class="dashboard-main">
      <aside class="left-panel">
        <section class="panel-section">
          <div class="section-label">Calendario</div>
          <div class="cal-toprow">
            <span class="cal-month-name" id="cal-month-name">-</span>
            <div class="cal-nav">
              <button id="cal-prev" aria-label="Mes anterior">‹</button>
              <button id="cal-next" aria-label="Mes siguiente">›</button>
            </div>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
        </section>

        <section class="panel-section">
          <div class="section-label">Recordatorios</div>
          <div id="reminder-list" class="stack"></div>
          <button class="add-btn" id="add-reminder-btn">+ Agregar recordatorio</button>
        </section>
      </aside>

      <section class="right-panel" id="right-panel">
        <div class="timeline-topbar">
          <span class="tl-title" id="day-title">Hoy</span>
          <button class="adapt-btn" id="adapt-btn">? Adaptar plan</button>
        </div>
        <div class="timeline-body" id="timeline-body"></div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="adapt-modal">
    <div class="modal">
      <div class="modal-title">Adaptar el plan de hoy</div>
      <div class="modal-stats">
        <div class="modal-stat-card">
          <div class="ms-label">Hora actual</div>
          <div class="ms-val" id="modal-now">--:--</div>
        </div>
        <div class="modal-stat-card">
          <div class="ms-label">Horas restantes</div>
          <div class="ms-val" id="modal-remaining">0h</div>
        </div>
      </div>
      <div class="modal-plan-box" id="adapt-plan-box"></div>
      <div class="modal-footer">
        <button class="btn-cancel" data-close-modal="adapt-modal">Cancelar</button>
        <button class="btn-confirm" id="adapt-apply-btn">Aplicar plan</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="reminder-modal">
    <div class="modal">
      <div class="modal-title">Nuevo recordatorio</div>
      <p class="modal-subtext">Se muestra en calendario y panel lateral.</p>
      <form class="modal-form" id="reminder-form">
        <input type="date" id="reminder-date" required>
        <input type="text" id="reminder-text" placeholder="Escribi el recordatorio" required>
      </form>
      <div class="modal-footer">
        <button class="btn-cancel" data-close-modal="reminder-modal">Cancelar</button>
        <button class="btn-confirm" id="save-reminder-btn">Guardar</button>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
